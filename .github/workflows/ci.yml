name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: cms_user
          POSTGRES_PASSWORD: cms_password
          POSTGRES_DB: cms_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.1.4
        bundler: latest
        working-directory: backend
        
    - name: Install dependencies
      working-directory: backend
      run: |
        gem update --system
        bundle install

    - name: Set up database
      working-directory: backend
      env:
        RAILS_ENV: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: cms_user
        DB_PASSWORD: cms_password
      run: |
        bundle exec rails db:create
        bundle exec rails db:migrate

    - name: Run RuboCop
      working-directory: backend
      run: bundle exec rubocop

    - name: Run tests
      working-directory: backend
      env:
        RAILS_ENV: test
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: cms_user
        DB_PASSWORD: cms_password
      run: bundle exec rails test

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Set up pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8

    - name: Install dependencies
      working-directory: frontend
      run: pnpm install

    - name: Run ESLint
      working-directory: frontend
      run: pnpm run lint

    - name: Run type check
      working-directory: frontend
      run: pnpm run build