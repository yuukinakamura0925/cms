# レスポンス定義
AuthResponse:
  type: object
  required:
    - status
    - message
  properties:
    status:
      type: string
      enum:
        - success
        - error
    message:
      type: string
    data:
      type: object
      properties:
        user:
          $ref: './models.yaml#/User'
        tokens:
          $ref: './models.yaml#/AuthTokens'
    errors:
      type: array
      items:
        type: string

MeResponse:
  type: object
  required:
    - status
  properties:
    status:
      type: string
      enum:
        - success
        - error
    message:
      type: string
    data:
      type: object
      properties:
        user:
          $ref: './models.yaml#/User'

HomeResponse:
  type: object
  required:
    - message
    - status
    - data
  properties:
    message:
      type: string
    status:
      type: string
    data:
      type: object
      required:
        - title
        - description
        - version
      properties:
        title:
          type: string
        description:
          type: string
        version:
          type: string

ErrorResponse:
  type: object
  properties:
    errors:
      type: array
      items:
        type: string
