openapi: 3.0.1
info:
  title: CMS API V1
  version: v1
  description: 顧客管理システム（CMS）のAPI仕様書

# パス定義（外部ファイル参照）
paths:
  # Home
  /api/v1/home:
    $ref: './paths/home.yaml#/~1api~1v1~1home'

  # Auth
  /api/v1/auth/login:
    $ref: './paths/auth.yaml#/~1api~1v1~1auth~1login'
  /api/v1/auth/register:
    $ref: './paths/auth.yaml#/~1api~1v1~1auth~1register'
  /api/v1/auth/logout:
    $ref: './paths/auth.yaml#/~1api~1v1~1auth~1logout'
  /api/v1/auth/me:
    $ref: './paths/auth.yaml#/~1api~1v1~1auth~1me'

  # User Profile
  /api/v1/user_profile:
    $ref: './paths/profiles.yaml#/~1api~1v1~1user_profile'

# コンポーネント定義（外部ファイル参照）
components:
  schemas:
    # Models
    User:
      $ref: './schemas/models.yaml#/User'
    UserProfile:
      $ref: './schemas/models.yaml#/UserProfile'
    AuthTokens:
      $ref: './schemas/models.yaml#/AuthTokens'

    # Requests
    LoginRequest:
      $ref: './schemas/requests.yaml#/LoginRequest'
    RegisterRequest:
      $ref: './schemas/requests.yaml#/RegisterRequest'
    UserProfileRequest:
      $ref: './schemas/requests.yaml#/UserProfileRequest'

    # Responses
    AuthResponse:
      $ref: './schemas/responses.yaml#/AuthResponse'
    MeResponse:
      $ref: './schemas/responses.yaml#/MeResponse'
    HomeResponse:
      $ref: './schemas/responses.yaml#/HomeResponse'
    ErrorResponse:
      $ref: './schemas/responses.yaml#/ErrorResponse'
